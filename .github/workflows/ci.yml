name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Allow only one concurrent run per branch — newer runs cancel in-flight ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  verify:
    name: Verify (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          AUTH_ENFORCE: "0"
          NEXT_PUBLIC_APP_NAME: HRFlow
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_APP_URL: https://hrflow.example.com

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 5

  a11y:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (generates route catalog)
        run: npm run build
        env:
          AUTH_ENFORCE: "0"
          NEXT_PUBLIC_APP_NAME: HRFlow
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_APP_URL: https://hrflow.example.com

      - name: Run axe-core accessibility spec
        run: npm run test:e2e -- --grep "a11y —"
        env:
          AUTH_ENFORCE: "0"
          NEXT_PUBLIC_APP_NAME: HRFlow
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_APP_URL: https://hrflow.example.com

      - name: Upload axe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-reports
          path: playwright-report/axe/
          retention-days: 14
